name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '30 22 * * *'  # 매일 UTC 22:30 = 한국시간 오전 7:30, 행사/혜택 동기화 + 서울 정보글 1건 생성
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── 스케줄/수동 실행: 행사/혜택 수집 → 서울 정보글 생성 → 검증 → 커밋 → 배포 ───
  # 음식점 인허가 데이터는 조회량이 커서 한국시간 매월 1일 또는 수동 실행에서만 수집합니다.
  update-and-deploy:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve scheduled sync scope
        id: sync-scope
        run: |
          seoul_day="$(TZ=Asia/Seoul date +%d)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$seoul_day" = "01" ]; then
            echo "run_food=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_food=false" >> "$GITHUB_OUTPUT"
          fi
          echo "seoul_day=$seoul_day" >> "$GITHUB_OUTPUT"

      - name: Fetch Seoul events
        run: npm run fetch:seoul-events
        env:
          SEOUL_OPEN_DATA_API_KEY: ${{ secrets.SEOUL_OPEN_DATA_API_KEY }}
          EVENTS_FETCH_FAILURE_MODE: "keep-existing"

      - name: Fetch public benefits
        run: npm run fetch:public-benefits
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}

      - name: Fetch Seoul food places
        if: steps.sync-scope.outputs.run_food == 'true'
        run: npm run fetch:seoul-food
        env:
          SEOUL_OPEN_DATA_API_KEY: ${{ secrets.SEOUL_OPEN_DATA_API_KEY }}
          FOOD_MAX_PLACES_PER_DISTRICT: "12"
          FOOD_FETCH_FAILURE_MODE: "keep-existing"
          FOOD_REQUEST_TIMEOUT_MS: "60000"
          FOOD_REQUEST_RETRY_COUNT: "3"

      - name: Skip Seoul food places
        if: steps.sync-scope.outputs.run_food != 'true'
        run: echo "일반음식점 데이터는 한국시간 매월 1일 또는 수동 실행에서만 수집합니다."

      - name: Generate blog post
        run: node scripts/generate-blog-post.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLOG_GENERATION_FAILURE_MODE: "keep-existing"
          GEMINI_REQUEST_RETRY_COUNT: "3"
          GEMINI_REQUEST_RETRY_BASE_DELAY_MS: "5000"
          GEMINI_REQUEST_RETRY_MAX_DELAY_MS: "60000"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_ADSENSE_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_ID }}
          NEXT_PUBLIC_ADSENSE_SLOT_HOME: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_HOME }}
          NEXT_PUBLIC_ADSENSE_SLOT_BLOG: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_BLOG }}
          NEXT_PUBLIC_COUPANG_PARTNER_ID: ${{ secrets.NEXT_PUBLIC_COUPANG_PARTNER_ID }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "자동 업데이트: 공공데이터 수집 및 블로그 글 생성"
            git push
          fi

      - name: Trim raw item data from deploy output
        run: |
          node <<'NODE'
          const { existsSync, rmSync } = require("node:fs");

          for (const itemDir of [
            "out/data/events/items",
            "out/data/benefits/items",
            "out/data/food/items",
          ]) {
            if (existsSync(itemDir)) {
              rmSync(itemDir, { recursive: true, force: true });
              console.log(`Removed ${itemDir}`);
            }
          }
          NODE

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=my-local-info
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── push 실행: 검증 → 빌드 → 배포 ───
  deploy-only:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_ADSENSE_ID: ${{ secrets.NEXT_PUBLIC_ADSENSE_ID }}
          NEXT_PUBLIC_ADSENSE_SLOT_HOME: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_HOME }}
          NEXT_PUBLIC_ADSENSE_SLOT_BLOG: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_BLOG }}
          NEXT_PUBLIC_COUPANG_PARTNER_ID: ${{ secrets.NEXT_PUBLIC_COUPANG_PARTNER_ID }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}

      - name: Trim raw item data from deploy output
        run: |
          node <<'NODE'
          const { existsSync, rmSync } = require("node:fs");

          for (const itemDir of [
            "out/data/events/items",
            "out/data/benefits/items",
            "out/data/food/items",
          ]) {
            if (existsSync(itemDir)) {
              rmSync(itemDir, { recursive: true, force: true });
              console.log(`Removed ${itemDir}`);
            }
          }
          NODE

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=my-local-info
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
